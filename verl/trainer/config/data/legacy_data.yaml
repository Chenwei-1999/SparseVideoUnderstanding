# Tokenizer class or path. If null, it will be inferred from the model.
tokenizer: null

# Whether to use shared memory for data loading.
use_shm: False

# Training set parquet. Can be a list or a single file.
train_files: ~/data/rlhf/gsm8k/train.parquet

# Validation parquet. Can be a list or a single file.
val_files: ~/data/rlhf/gsm8k/test.parquet

# Maximum sample count to use from the training set. -1 uses the full dataset.
train_max_samples: -1

# Maximum sample count to use from the validation set. -1 uses the full dataset.
val_max_samples: -1

# Dataset field containing the prompt.
prompt_key: prompt

# Dataset field used to select the reward function.
reward_fn_key: data_source

# Maximum prompt length. Rollout.prompt_length defaults to this value.
max_prompt_length: 512

# Maximum generated response length.
max_response_length: 512

# Batch size sampled for one RL training iteration.
train_batch_size: 1024

# Batch size used during validation. Null lets the trainer choose.
val_batch_size: null

# Tool config path used to calculate true prompt length for tool-using rollouts.
tool_config_path: ${oc.select:actor_rollout_ref.rollout.multi_turn.tool_config_path, null}

# Function tool path used by @function_tool entries.
function_tool_path: ${oc.select:actor_rollout_ref.rollout.multi_turn.function_tool_path, null}

# Return original input IDs without applying chat template.
return_raw_input_ids: False

# Return original chat messages without applying chat template.
return_raw_chat: True

# Return the full prompt with chat template.
return_full_prompt: False

# Shuffle the training dataloader.
shuffle: True

# Seed used when shuffling the data.
seed: null

# Number of dataloader workers.
dataloader_num_workers: 8

# Image patch size used by multimodal processors.
image_patch_size: 14

# Shuffle the validation set.
validation_shuffle: False

# Filter overlong prompts before training.
filter_overlong_prompts: False

# Number of workers used for overlong-prompt filtering.
filter_overlong_prompts_workers: 1

# Prompt truncation strategy: error, left, right, or middle.
truncation: error

# Dataset field containing images.
image_key: images

# Dataset field containing videos.
video_key: videos

# Dataset field containing audio.
audio_key: audios

# Allow remote tokenizer/model code.
trust_remote_code: False

# Optional custom dataset implementation.
custom_cls:

  # Python path containing the custom dataset class.
  path: null

  # Class name in the custom dataset module.
  name: null

# Return multimodal inputs from the dataset.
return_multi_modal_inputs: True

# Extra kwargs for tokenizer.apply_chat_template.
apply_chat_template_kwargs: {}

# Extra kwargs passed to multimodal processors/backends.
mm_processor_kwargs: {}
